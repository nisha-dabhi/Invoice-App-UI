<div class="auth-container" [class.dark]="isDarkMode">

    <div class="auth-card">

        <div class="header">
            <h3>Create Account</h3>

            <div class="theme-toggle" (click)="isDarkMode = !isDarkMode">
                <i class="bi" [ngClass]="isDarkMode ? 'bi-moon-fill' : 'bi-sun-fill'"></i>
                <div class="toggle-ball" [class.active]="isDarkMode"></div>
            </div>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="register()">

            <h6 class="section-title">User Details</h6>

            <div class="row">

                <div class="col-md-6">
                    <label>First Name<span class="text-danger">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-person"></i>
                        <input type="text" class="custom-input" formControlName="firstName"
                            placeholder="Enter first name" [class.input-error]="isInvalid('firstName')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('firstName')">
                        First name is required
                    </div>
                </div>

                <div class="col-md-6">
                    <label>Last Name<span class="text-danger">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-person"></i>
                        <input type="text" class="custom-input" formControlName="lastName" placeholder="Enter last name"
                            [class.input-error]="isInvalid('lastName')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('lastName')">
                        Last name is required
                    </div>
                </div>

                <div class="col-md-6">
                    <label>Email<span class="text-danger">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="custom-input" formControlName="email" placeholder="Enter email"
                            [class.input-error]="isInvalid('email')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('email')">
                        <span *ngIf="f['email'].errors?.['required']">Email required</span>
                        <span *ngIf="f['email'].errors?.['email']">Invalid email</span>
                    </div>
                </div>

                <div class="col-md-6">
                    <label>Phone<span class="text-danger">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-telephone"></i>
                        <input type="text" class="custom-input" formControlName="phone" placeholder="Enter phone"
                            maxlength="10" (keypress)="onlyNumbers($event)"
                            [class.input-error]="f['phone'].invalid && f['phone'].touched">
                    </div>
                    <div class="error-msg" *ngIf="f['phone'].invalid && f['phone'].touched">
                        <span *ngIf="f['phone'].errors?.['required']">Phone required</span>
                        <span *ngIf="f['phone'].errors?.['pattern']">Enter valid number</span>
                    </div>
                </div>

                <div class="col-md-6">
                    <label>Password<span class="text-danger">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-lock"></i>
                        <input [type]="showPassword ? 'text' : 'password'" class="custom-input"
                            formControlName="password" placeholder="Enter password"
                            [class.input-error]="f['password'].invalid && f['password'].touched">
                        <span class="eye" (click)="togglePassword()">
                            <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
                        </span>
                    </div>
                    <div class="error-msg" *ngIf="f['password'].invalid && f['password'].touched">
                        <span *ngIf="f['password'].errors?.['required']">Password required</span>
                        <span *ngIf="f['password'].errors?.['minlength']">Min 6 characters</span>
                    </div>
                </div>

            </div>

            <hr>

            <h6 class="section-title">Company Details</h6>

            <div class="row">

                <div class="col-md-6">
                    <label>Company Name<span class="text-danger">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-building"></i>
                        <input type="text" class="custom-input" formControlName="companyName" placeholder="Company name"
                            [class.input-error]="isInvalid('companyName')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('companyName')">
                        Company name required
                    </div>
                </div>

                <div class="col-md-6">
                    <label>Company Email<span class="text-danger">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-envelope"></i>
                        <input type="email" class="custom-input" formControlName="companyEmail"
                            placeholder="Company email" [class.input-error]="isInvalid('companyEmail')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('companyEmail')">
                        Valid email required
                    </div>
                </div>

                <div class="col-md-6">
                    <label>Company Phone<span class="text-danger">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-telephone"></i>
                        <input type="text" class="custom-input" formControlName="companyPhone"
                            placeholder="Enter company phone" maxlength="10" (keypress)="onlyNumbers($event)"
                            [class.input-error]="f['companyPhone'].invalid && f['companyPhone'].touched">
                    </div>
                    <div class="error-msg" *ngIf="f['companyPhone'].invalid && f['companyPhone'].touched">
                        <span *ngIf="f['companyPhone'].errors?.['required']">Required</span>
                        <span *ngIf="f['companyPhone'].errors?.['pattern']">Invalid</span>
                    </div>
                </div>

                <div class="col-md-6">
                    <label>Address<span class="text-danger">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-geo-alt"></i>
                        <input type="text" class="custom-input" formControlName="address" placeholder="Enter address"
                            [class.input-error]="isInvalid('address')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('address')">
                        Address required
                    </div>
                </div>

            </div>

            <div class="btn-group-custom">
                <button type="button" class="btn-login" (click)="goToLogin()">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
                <button type="submit" class="btn-register" [disabled]="registerForm.invalid">
                    <i class="bi bi-person-plus"></i> Register
                </button>
            </div>

        </form>
    </div>
</div>
