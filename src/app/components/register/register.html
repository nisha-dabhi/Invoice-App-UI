<div class="auth-container">
    <div class="auth-card">

        <h3 class="text-center mb-4">Create Account</h3>

        <form [formGroup]="registerForm" (ngSubmit)="register()">

            <h6 class="section-title">User Details</h6>

            <div class="row">
                <div class="col-md-6 mt-1">
                    <label class="custom-label">First Name</label>
                    <div class="input-wrap">
                        <i class="bi bi-person-fill input-icon"></i>
                        <input type="text" class="custom-input" formControlName="firstName"
                            placeholder="Enter first name" [class.input-error]="isInvalid('firstName')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('firstName')">
                        <small>First name is required</small>
                    </div>
                </div>

                <div class="col-md-6 mt-1">
                    <label class="custom-label">Last Name</label>
                    <div class="input-wrap">
                        <i class="bi bi-person-fill input-icon"></i>
                        <input type="text" class="custom-input" formControlName="lastName" placeholder="Enter last name"
                            [class.input-error]="isInvalid('lastName')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('lastName')">
                        <small>Last name is required</small>
                    </div>
                </div>

                <div class="col-md-6 mt-1">
                    <label class="custom-label">Email</label>
                    <div class="input-wrap">
                        <i class="bi bi-envelope-fill input-icon"></i>
                        <input type="email" class="custom-input" formControlName="email" placeholder="Enter email"
                            [class.input-error]="isInvalid('email')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('email')">
                        <small *ngIf="f['email'].errors?.['required']">Email required</small>
                        <small *ngIf="f['email'].errors?.['email']">Invalid email</small>
                    </div>
                </div>
           
                <div class="col-md-6 mt-1">
                    <label class="custom-label">Phone<span class="text-danger">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-telephone-fill input-icon"></i>
                        <input type="text" class="custom-input" formControlName="phone" placeholder="Enter phone"
                            maxlength="10" (keypress)="onlyNumbers($event)"
                            [class.input-error]="f['phone'].invalid && f['phone'].touched">
                    </div>
                    <div class="error-msg" *ngIf="f['phone'].invalid && f['phone'].touched">
                        <small *ngIf="f['phone'].errors?.['required']">Phone required</small>
                        <small *ngIf="f['phone'].errors?.['pattern']">Enter valid number</small>
                    </div>
                </div>

                <div class="col-md-6 mt-1">
                    <label class="custom-label">Password</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock-fill input-icon"></i>
                        <input [type]="showPassword ? 'text' : 'password'" class="custom-input"
                            formControlName="password" placeholder="Enter password"
                            [class.input-error]="isInvalid('password')">
                        <span class="toggle-icon" (click)="togglePassword()">
                            <i [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
                        </span>
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('password')">
                        <small *ngIf="f['password'].errors?.['required']">Password required</small>
                        <small *ngIf="f['password'].errors?.['minlength']">Min 6 characters</small>
                    </div>
                </div>
            </div>

            <br>
            <hr>
            <br>

            <h6 class="section-title mt-0">Company Details</h6>

            <div class="row">
                <div class="col-md-6 mt-1">
                    <label class="custom-label">Company Name</label>
                    <div class="input-wrap">
                        <i class="bi bi-building input-icon"></i>
                        <input type="text" class="custom-input" formControlName="companyName" placeholder="Company name"
                            [class.input-error]="isInvalid('companyName')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('companyName')">
                        <small>Company name required</small>
                    </div>
                </div>

                <div class="col-md-6 mt-1">
                    <label class="custom-label">Company Email</label>
                    <div class="input-wrap">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email" class="custom-input" formControlName="companyEmail"
                            placeholder="Company email" [class.input-error]="isInvalid('companyEmail')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('companyEmail')">
                        <small>Valid email required</small>
                    </div>
                </div>

                <div class="col-md-6 mt-1">
                    <label class="custom-label">Company Phone<span class="text-danger">*</span></label>
                    <div class="input-wrap">
                        <i class="bi bi-telephone-fill input-icon"></i>
                        <input type="text" class="custom-input" formControlName="companyPhone"
                            placeholder="Enter company phone" maxlength="10" (keypress)="onlyNumbers($event)"
                            [class.input-error]="f['companyPhone'].invalid && f['companyPhone'].touched">
                    </div>
                    <div class="error-msg" *ngIf="f['companyPhone'].invalid && f['companyPhone'].touched">
                        <small *ngIf="f['companyPhone'].errors?.['required']">Company phone required</small>
                        <small *ngIf="f['companyPhone'].errors?.['pattern']">Enter valid number</small>
                    </div>
                </div>

                <div class="col-md-6 mt-1">
                    <label class="custom-label">Address</label>
                    <div class="input-wrap">
                        <i class="bi bi-geo-alt-fill input-icon"></i>
                        <input type="text" class="custom-input" formControlName="address" placeholder="Enter address"
                            [class.input-error]="isInvalid('address')">
                    </div>
                    <div class="error-msg" *ngIf="isInvalid('address')">
                        <small>Address required</small>
                    </div>
                </div>
            </div>

            <div class="btn-group-custom">
                <button type="button" class="btn-premium btn-login" (click)="goToLogin()">
                    <i class="bi bi-box-arrow-in-right me-1"></i>
                    Login
                </button>

                <button type="submit" class="btn-premium btn-register" [disabled]="registerForm.invalid">
                    <i class="bi bi-person-plus me-1"></i>
                    Register
                </button>
            </div>

        </form>
    </div>
</div>
