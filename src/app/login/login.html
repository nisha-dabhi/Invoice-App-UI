<div class="login-wrapper">
    <div class="login-box">

        <div class="brand-section">
            <div class="user-icon">
                <i class="bi bi-person"></i>
            </div>
            <h2 class="login-title">Welcome to Invoice</h2>
            <p class="login-subtitle">Login into your account</p>
        </div>

        <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">

            <div class="mb-4">
                <label class="custom-label">Email</label>
                <div class="input-wrap">
                    <i class="bi bi-envelope-fill input-icon"></i>
                    <input type="email" name="email" class="custom-input" placeholder="Enter your email"
                        [(ngModel)]="loginData.email" #email="ngModel" required
                        [class.input-error]="email.invalid && (email.touched || loginForm.submitted)">
                </div>
                <div class="error-msg text-danger" *ngIf="email.invalid && email.touched">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <small *ngIf="email.errors?.['required']">Email is required</small>
                    <small *ngIf="email.errors?.['email']">Invalid email format</small>
                </div>
            </div>

            <div class="mb-4">
                <label class="custom-label">Password</label>
                <div class="input-wrap">
                    <i class="bi bi-lock-fill input-icon"></i>
                    <input type="password" name="password" class="custom-input" placeholder="Enter your password"
                        [(ngModel)]="loginData.password" #password="ngModel" required
                        [class.input-error]="password.invalid && (password.touched || loginForm.submitted)">
                </div>
                <div  class="error-msg text-danger" *ngIf="password.invalid && password.touched">
                    <i class="bi bi-exclamation-circle-fill"></i>
                    <small *ngIf="password.errors?.['required']">Password is required.</small>
                    <small *ngIf="password.errors?.['minlength']">Minimum 8 characters.</small>
                </div>
            </div>

            <div class="d-flex justify-content-center mt-1 mb-5">
                <button class="login-btn">
                    LOGIN &nbsp;<i class="bi bi-arrow-right-circle"></i>
                </button>
            </div>

            <div class="d-flex justify-content-end mb-3">
                <span routerLink="/register" class="register-link">
                    <i class="bi bi-person-plus me-1"></i><b>Don't have an account? Register here</b>
                </span>
            </div>
        </form>
    </div>
</div>
